<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro Responsivo</title>
    <script src="https://kit.fontawesome.com/e057003d91.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <main id="form_container">
        <div id="form_header">
            <h1 id="form_title">Criar conta</h1>
            <button class="btn-default">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </div>
        <form action="" id="form">
            <div id="input_container">

                <div class="input-box">
                    <label for="name" class="form-label">Primeiro Nome</label>
                    <div class="input-field">
                        <input type="text" id="name" name="name" class="form-control" placeholder="Fulano">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="input-box">
                    <label for="last_name" class="form-label">Último Nome</label>
                    <div class="input-field">
                        <input type="text" id="last_name" name="last_name" class="form-control" placeholder="De tal">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>


                <div class="input-box">
                    <label for="birthdate" class="form-label">Data de Nascimento</label>
                    <div class="input-field">
                        <input type="date" id="birthdate" name="birthdate" class="form-control">
                    </div>
                </div>

                <div class="input-box">
                    <label for="email" class="form-label">E-mail</label>
                    <div class="input-field">
                        <input type="email" id="email" name="email" class="form-control"
                            placeholder="fulano@exemplo.com">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                </div>

                <div class="input-box">
                    <label for="password" class="form-label">Senha</label>
                    <div class="input-field">
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="********">
                        <i class="fa-regular fa-eye-slash password-icon"></i>
                    </div>
                </div>

                <div class="input-box">
                    <label for="confirm_password" class="form-label">Confirmar Senha</label>
                    <div class="input-field">
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                            placeholder="********">
                        <i class="fa-regular fa-eye-slash password-icon"></i>
                    </div>
                </div>

                <div class="radio-container">
                    <label class="form-label">Gênero</label>

                    <div id="gender_inputs">
                        <div class="radio-box">
                            <input type="radio" id="female" name="gender" value="female">
                            <label for="female" class="form-label">Feminino</label>

                        </div>
                        <div class="radio-box">
                            <input type="radio" id="male" name="gender" value="male">
                            <label for="male" class="form-label">Masculino</label>
                        </div>

                        <div class="radio-box">
                            <input type="radio" id="other" name="gender" value="other">
                            <label for="other" class="form-label">Outro</label>
                        </div>

                    </div>
                </div>

            </div>

            <button type="submit" class="btn-default">
                <i class="fa-solid fa-check"></i>
                Criar Conta
            </button>

        </form>
    </main>

    <script src="src/javascript/script.js"></script>
</body>

</html>
